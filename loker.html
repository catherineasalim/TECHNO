<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loker — Pathly</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<div id="navbar"></div>

<section id="loker" class="active">
  <div class="loker-header">
    <div class="section-label">Lowongan Kerja</div>
    <div class="section-title">Temukan pekerjaan <span>impianmu</span></div>

    <div class="glass search-bar-wrapper">
      <div class="search-left">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Cari posisi, perusahaan, atau skill..." id="jobSearch" oninput="filterJobs()">
      </div>

      <div class="search-actions">
        <button class="save-btn" onclick="showSaved()">💾 Registered</button>
        <button class="applied-btn" onclick="showApplied()">📂 Archived</button>
      </div>
    </div>

    <div class="filter-chips">
      <button class="chip active" onclick="setFilter('Semua', this)">Semua</button>
      <button class="chip" onclick="setFilter('Remote', this)">Remote</button>
      <button class="chip" onclick="setFilter('Full-time', this)">Full-time</button>
      <button class="chip" onclick="setFilter('IT', this)">IT</button>
      <button class="chip" onclick="setFilter('Business', this)">Business</button>
      <button class="chip" onclick="setFilter('Design', this)">Design</button>
      <button class="chip" onclick="setFilter('Marketing', this)">Marketing</button>
    </div>
  </div>

  <div class="loker-grid" id="lokerGrid"></div>
</section>


<!-- APPLY MODAL -->
<div class="modal-overlay" id="applyModal">
  <div class="modal">

    <div class="modal-header">
      <button class="modal-close" onclick="closeApplyModal()">✕</button>

      <div class="modal-header-badge">
        💼 Job Application
      </div>

      <h3>Verifikasi Data Lamaran</h3>
      <p class="modal-desc">
        Lengkapi data dasar kamu sebelum mengirim lamaran.
      </p>
    </div>

    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Nama Lengkap</label>
          <input id="applyName" placeholder="Nama lengkap">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input id="applyEmail" type="email" placeholder="nama@email.com">
        </div>

        <div class="form-group">
          <label>Nomor WhatsApp</label>
          <input id="applyPhone" placeholder="08xxxxxxxxxx">
        </div>

        <div class="form-group">
          <label>Universitas</label>
          <input id="applyUniversity" placeholder="Universitas asal">
        </div>

        <div class="form-group">
          <label>Jurusan</label>
          <input id="applyMajor" placeholder="Jurusan">
        </div>

        <div class="form-group">
          <label>LinkedIn URL</label>
          <input id="applyLinkedin" placeholder="linkedin.com/in/username">
        </div>

        <div class="form-group full">
          <label>Alasan Melamar</label>
          <textarea id="applyReason" placeholder="Ceritakan alasan kamu melamar"></textarea>
        </div>
      </div>

      <div class="modal-footer">
        <button class="modal-cancel" onclick="closeApplyModal()">Batal</button>
        <button class="modal-submit" onclick="submitApplyForm()">Kirim Lamaran →</button>
      </div>
    </div>

  </div>
</div>


<!-- SUCCESS MODAL -->
<div class="modal-overlay" id="successModal">
  <div class="modal success-modal">
    <button class="modal-close" onclick="closeSuccessModal()">✕</button>

    <div class="success-icon">✓</div>

    <h3 id="successTitle">Berhasil</h3>
    <p id="successMessage">Data berhasil diproses.</p>

    <button class="modal-submit" onclick="closeSuccessModal()">Selesai</button>
  </div>
</div>

<script src="script.js" defer></script>
<div class="mobile-bottom-nav">
  <a href="home.html">Home</a>
  <a href="loker.html">Loker</a>
  <a href="mentoring.html">Mentor</a>
  <a href="campus.html">Campus</a>
</div>
</body>
</html>
